3. Di dalam kotak isi file di bawahnya, tempelkan (*paste*) kode konfigurasi standar Vite berikut ini:

```yaml
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # atau ganti master jika nama branch utama Anda 'master'

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Folder hasil build dari Lovable/Vite
          branch: gh-pages # Branch khusus tempat menaruh web jadi
